<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendamento | Lab Misturas Asfálticas</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        /* ESTILO PARA OS TÍTULOS DO SELECT */
        .select-header {
            color: #D35400 !important; 
            font-weight: 900 !important; 
            background-color: #f4f4f4 !important;
            font-size: 13px;
            padding: 5px 0;
            text-shadow: 0.6px 0 0 currentColor, -0.2px 0 0 currentColor;
        }

        option:not(.select-header) {
            color: #333 !important;
            font-weight: 400 !important;
            background-color: #fff !important;
        }

        /* CAIXA DE EQUIPAMENTOS (Aparece ao clicar) */
        .equipamentos-box {
            display: none; /* Escondido por padrão */
            background-color: #fff3e0;
            border-left: 5px solid #D35400;
            padding: 15px;
            margin-top: 15px;
            border-radius: 4px;
            animation: fadeIn 0.3s ease-in-out;
        }

        .equipamentos-box h4 {
            margin: 0 0 10px 0;
            color: #D35400;
            font-size: 0.9rem;
            text-transform: uppercase;
        }

        .lista-equip {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .lista-equip li {
            background: #1A4A5A;
            color: white;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: 500;
        }

        /* TABELA E ALINHAMENTO */
        .table-section { margin-top: 20px; overflow: hidden; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        #tabela-horarios { width: 100%; border-collapse: collapse; font-family: 'Inter', sans-serif; table-layout: fixed; }
        #tabela-horarios thead th { background-color: #1A4A5A; color: white; padding: 18px 15px; text-transform: uppercase; font-size: 0.85rem; text-align: center; }
        #tabela-horarios td { padding: 15px; text-align: center; border-bottom: 1px solid #eee; font-size: 0.95rem; vertical-align: middle; }
        .col-horario { font-weight: 500; color: #444; }
        .status-disponivel { color: #27ae60; font-weight: 700; }
        input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; accent-color: #1A4A5A; margin: 0 auto; display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <header class="main-header" style="background: linear-gradient(135deg, #1A4A5A 0%, #2a6f84 100%); padding: 26px 0; color: white; border-bottom: 4px solid #143a46; position: relative;">
        <div class="container" style="display: flex; align-items: center; justify-content: center; gap: 50px; max-width: 1100px; margin: 0 auto;">
            <img src="img/foto.png" alt="Logo" style="width: 200px; border-radius: 15px;">
            <div style="text-align: left;">
                <h1 style="margin: 0; font-size: 2.5rem; font-weight: 900;">Sistema de Agendamento</h1>
                <p style="margin: 10px 0; font-size: 1.2rem;">LMP | INCT-Infra | UFC</p>
            </div>
        </div>
    </header>

    <main class="container" style="margin-top: 30px;">
        <section class="info-section">
            <div class="card info-geral">
                <h3><span class="icon">ℹ️</span> INFORMAÇÕES GERAIS</h3>
                <ul class="info-list">
                    <li><strong>1.</strong> Utilizar EPIs obrigatórios.</li>
                    <li><strong>2.</strong> Manter o laboratório limpo após o uso.</li>
                </ul>
            </div>
        </section>

        <section class="booking-section card">
            <div class="form-grid">
                <div class="input-group full-width">
                    <label for="maquina">Opções de Agendamento:</label>
                    <select id="maquina" onchange="aoSelecionarEnsaio(this)">
                        <option value="" disabled selected>Escolha a atividade...</option>
                        
                        <option class="select-header" value="TITULO">➤ ENSAIOS DE DOSAGEM (OCUPA 3 ESTUFAS)</option>
                        <option value="marshall_gmb">1.1 - Dosagem Marshall: Gmb-Compactação</option>
                        <option value="marshall_gmm">1.2 - Dosagem Marshall: Gmm-Massa solta</option>
                        
                        <option class="select-header" value="TITULO">➤ EQUIPAMENTOS INDIVIDUAIS</option>
                        <option value="granulometria">8 - Granulometria</option>
                        <option value="los_angeles">11 - Abrasão Los Angeles</option>
                        <option value="secagem">14 - Secagem de material</option>
                    </select>

                    <div id="caixa-equipamentos" class="equipamentos-box">
                        <h4>Equipamentos que serão reservados:</h4>
                        <ul id="lista-equipamentos" class="lista-equip">
                            </ul>
                    </div>
                </div>
            </div>

            <div class="action-area" style="margin-top: 20px;">
                <input type="password" id="senha-lab" placeholder="Senha do Lab">
                <button class="btn-primary" onclick="confirmar()" style="background-color: #1A4A5A; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer;">Confirmar Reserva</button>
            </div>
        </section>

        <section class="table-section card">
            <table id="tabela-horarios">
                <thead>
                    <tr><th>Horário</th><th>Status</th><th>Ação</th></tr>
                </thead>
                <tbody id="corpo-agenda"></tbody>
            </table>
        </section>
    </main>

    <script>
        // Mapa de equipamentos por ensaio
        const equipamentosPorEnsaio = {
            "marshall_gmb": ["Compactador Marshall", "Estufa 01", "Estufa 02", "Estufa 03", "Balança Hidrostática"],
            "marshall_gmm": ["Balança Digital", "Estufa 01", "Estufa 02", "Estufa 03", "Mesa Vibratória", "Bomba de Vácuo"],
            "granulometria": ["Agitador de Peneiras", "Série de Peneiras", "Balança 20kg"],
            "los_angeles": ["Máquina Los Angeles", "Carga Abrasiva", "Peneira #12"],
            "secagem": ["Estufa 01 (ou disponível)"]
        };

        function aoSelecionarEnsaio(select) {
            const valor = select.value;
            const caixa = document.getElementById('caixa-equipamentos');
            const lista = document.getElementById('lista-equipamentos');

            if (valor === "TITULO") {
                alert("Selecione um ensaio válido.");
                select.selectedIndex = 0;
                caixa.style.display = 'none';
                return;
            }

            // Busca os equipamentos no mapa
            const equipamentos = equipamentosPorEnsaio[valor];

            if (equipamentos) {
                lista.innerHTML = equipamentos.map(item => `<li>${item}</li>`).join('');
                caixa.style.display = 'block';

                // Alerta se for dosagem (3 estufas)
                if (valor.includes("marshall")) {
                    alert("Atenção: Este ensaio ocupará todas as 3 estufas do laboratório.");
                }
            } else {
                caixa.style.display = 'none';
            }
        }

        function carregarHorarios() {
            const corpo = document.getElementById('corpo-agenda');
            let html = '';
            for (let h = 7; h <= 17; h++) {
                html += `<tr>
                    <td class="col-horario">${h}:00 - ${h+1}:00</td>
                    <td class="status-disponivel">Disponível</td>
                    <td><input type="checkbox"></td>
                </tr>`;
            }
            corpo.innerHTML = html;
        }

        window.onload = carregarHorarios;
    </script>
</body>
</html>
