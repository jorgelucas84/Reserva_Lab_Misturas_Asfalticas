<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendamento | Lab Misturas Asfálticas</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        /* ESTILO PARA OS TÍTULOS DO SELECT */
        .select-header {
            color: #D35400 !important; 
            font-weight: 900 !important; 
            background-color: #f4f4f4 !important;
            font-size: 13px;
            padding: 5px 0;
            text-shadow: 0.6px 0 0 currentColor, -0.2px 0 0 currentColor;
        }

        option:not(.select-header) {
            color: #333 !important;
            font-weight: 400 !important;
            background-color: #fff !important;
            text-shadow: none;
        }

        /* CAIXA DE INFORMAÇÃO DE EQUIPAMENTOS */
        .equipamentos-info-box {
            display: none; /* Escondido por padrão */
            margin-top: 15px;
            padding: 15px;
            background-color: #eef7f9;
            border-left: 4px solid #1A4A5A;
            border-radius: 4px;
            animation: slideDown 0.3s ease-out;
        }

        .equipamentos-info-box h4 {
            margin: 0 0 8px 0;
            color: #1A4A5A;
            font-size: 0.9rem;
            text-transform: uppercase;
        }

        .equipamentos-info-box ul {
            margin: 0;
            padding-left: 20px;
            font-size: 0.85rem;
            color: #444;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ESTILO DA TABELA */
        .table-section {
            margin-top: 20px;
            overflow: hidden;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        #tabela-horarios {
            width: 100%;
            border-collapse: collapse;
            font-family: 'Inter', sans-serif;
            table-layout: fixed;
        }

        #tabela-horarios thead th {
            background-color: #1A4A5A;
            color: white;
            padding: 18px 15px;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
            text-align: center;
        }

        #tabela-horarios td {
            padding: 15px;
            text-align: center;
            border-bottom: 1px solid #eee;
            font-size: 0.95rem;
            vertical-align: middle;
        }

        .col-horario { font-weight: 500; color: #444; }
        .status-disponivel { color: #27ae60; font-weight: 700; }

        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #1A4A5A;
            margin: 0 auto;
            display: block;
        }

        #tabela-horarios tbody tr:nth-child(even) { background-color: #fafafa; }
        #tabela-horarios tbody tr:hover { background-color: #f1f5f7; }
    </style>
</head>
<body>

    <header class="main-header" style="background: linear-gradient(135deg, #1A4A5A 0%, #2a6f84 100%); padding: 26px 0; color: white; border-bottom: 4px solid #143a46; position: relative; overflow: hidden;">
        <div style="position: absolute; top: 0; right: 0; width: 45%; height: 100%; background: url('img/pavimento.jpg') no-repeat center right; background-size: cover; opacity: 0.15; pointer-events: none; z-index: 0;"></div>
        <div class="container" style="display: flex; align-items: center; justify-content: center; gap: 50px; max-width: 1100px; margin: 0 auto; position: relative; z-index: 1;">
            <div style="flex-shrink: 0;">
                <img src="img/foto.png" alt="Logotipo" style="width: 221px; height: auto; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.25);">
            </div>
            <div style="text-align: left;">
                <h1 style="margin: 0; font-size: 2.5rem; font-weight: 900; line-height: 1.2; color: #ffffff;">Sistema de Agendamento</h1>
                <p style="margin: 10px 0; font-size: 1.4rem; font-weight: 500; color: #ffffff;">LMP | INCT-Infra | UFC</p>
            </div>
        </div>
    </header>

    <main class="container" style="margin-top: 30px;">
        <section class="booking-section card">
            <div class="form-grid">
                <div class="input-group full-width">
                    <label for="maquina">Opções de Agendamento:</label>
                    <select id="maquina" onchange="validarAtividade(this)">
                        <option value="" disabled selected>Escolha a atividade ou equipamento...</option>
                        
                        <option class="select-header" value="TITULO">➤ ENSAIOS QUE DEMANDAM MÚLTIPLOS EQUIPAMENTOS</option>
                        <option value="marshall_gmb" data-tipo="DOSAGEM">1.1 - Dosagem Marshall: Gmb-Compactação de CPs</option>
                        <option value="marshall_gmm" data-tipo="DOSAGEM">1.2 - Dosagem Marshall: Gmm-Massa solta ou DMT</option>
                        <option value="superpave_gmb" data-tipo="DOSAGEM">2.1 - Dosagem Superpave: Gmb-Compactação de CPs</option>
                        <option value="superpave_gmm" data-tipo="DOSAGEM">2.2 - Dosagem Superpave: Gmm-Massa solta ou DMT</option>
                        <option value="extracao" data-tipo="NORMAL">3 - Extração de ligante [DNER 053/94]</option>
                        <option value="abrasao" data-tipo="NORMAL">4 - Abrasão Los Angeles [DNIT 451/2024]</option>
                        
                        <option disabled>──────────────────────────────</option>
                        <option class="select-header" value="TITULO">➤ EQUIPAMENTOS INDIVIDUAIS</option>
                        <option value="granulometria" data-tipo="NORMAL">8 - Granulometria</option>
                        <option value="secagem" data-tipo="NORMAL">14 - Secagem de material</option>
                    </select>

                    <div id="caixa-equipamentos" class="equipamentos-info-box">
                        <h4><span class="icon">🛠️</span> Equipamentos Utilizados:</h4>
                        <ul id="lista-equipamentos"></ul>
                    </div>
                </div>
            </div>
        </section>

        <section class="table-section card">
            <table id="tabela-horarios">
                <thead>
                    <tr><th>Horário</th><th>Status</th><th>Ação</th></tr>
                </thead>
                <tbody id="corpo-agenda"></tbody>
            </table>
        </section>
    </main>

    <script>
        // Mapa de equipamentos por ensaio
        const mapaEquipamentos = {
            "marshall_gmb": ["Compactador Marshall", "Estufas (3 unidades)", "Balanças", "Banho Maria"],
            "marshall_gmm": ["Mesa Vibratória", "Bomba de Vácuo", "Estufas (3 unidades)", "Picnômetros"],
            "superpave_gmb": ["Compactador Giratório Superpave", "Estufas (3 unidades)", "Balanças"],
            "superpave_gmm": ["Mesa Vibratória", "Bomba de Vácuo", "Estufas (3 unidades)"],
            "extracao": ["Rotarex / Centrífuga", "Estufa", "Balança"],
            "abrasao": ["Máquina Los Angeles", "Série de Peneiras", "Balança"],
            "granulometria": ["Agitador de Peneiras", "Série de Peneiras"],
            "secagem": ["Estufa ventilada"]
        };

        function carregarHorarios() {
            const corpo = document.getElementById('corpo-agenda');
            let html = '';
            for (let h = 7; h <= 17; h++) {
                html += `<tr>
                    <td class="col-horario">${h}:00 - ${h+1}:00</td>
                    <td class="status-disponivel">Disponível</td>
                    <td><input type="checkbox"></td>
                </tr>`;
            }
            corpo.innerHTML = html;
        }

        function validarAtividade(select) {
            const valor = select.value;
            const opcao = select.options[select.selectedIndex];
            const tipo = opcao.getAttribute('data-tipo');
            
            const caixa = document.getElementById('caixa-equipamentos');
            const lista = document.getElementById('lista-equipamentos');

            if (valor === "TITULO") {
                select.selectedIndex = 0;
                caixa.style.display = "none";
                return;
            }

            // Exibir equipamentos na caixinha
            if (mapaEquipamentos[valor]) {
                lista.innerHTML = mapaEquipamentos[valor].map(eq => `<li>${eq}</li>`).join('');
                caixa.style.display = "block";
            } else {
                caixa.style.display = "none";
            }

            // Lógica de alerta para dosagem
            if (tipo === "DOSAGEM") {
                const confirmacao = confirm("Atenção: Os procedimentos de DOSAGEM utilizam as 3 estufas simultaneamente. Confirmar uso exclusivo?");
                if (!confirmacao) {
                    select.selectedIndex = 0;
                    caixa.style.display = "none";
                }
            }
        }

        window.onload = carregarHorarios;
    </script>
</body>
</html>
