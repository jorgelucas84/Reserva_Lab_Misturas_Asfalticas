<section class="booking-section card">
            <div class="form-grid">
                <div class="input-group">
                    <label for="nome">Nome Completo</label>
                    <input type="text" id="nome" placeholder="Seu nome">
                </div>
                <div class="input-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" placeholder="seu-email@ufc.br" required>
                </div>

                <div class="input-group">
                    <label for="orientador">Orientador</label>
                    <input type="text" id="orientador" placeholder="Nome do Prof.">
                </div>
                <div class="input-group">
                    <label for="projeto">Nome do Projeto</label>
                    <input type="text" id="projeto" placeholder="Título da pesquisa/projeto">
                </div>

                <div class="input-group">
                    <label for="data">Data do Uso</label>
                    <input type="date" id="data">
                </div>
                
                <div class="input-group full-width">
                    <label for="maquina">Opções de Agendamento:</label>
                    <select id="maquina">
                        <option value="" disabled selected>Escolha a atividade ou equipamento...</option>
                        <optgroup label="ENSAIOS QUE DEMANDAM MÚLTIPLOS EQUIPAMENTOS">
                            <option value="1">1.1 Dosagem Marshall: Gmb-Compactação de CPs</option>
                            <option value="2">1.2 Dosagem Marshall: Gmm-Massa solta ou DMT</option>
                            <option value="3">2.1 Dosagem Superpave: Gmb-Compactação de CPs</option>
                            <option value="4">2.2 Dosagem Superpave: Gmm-Massa solta ou DMT</option>
                            <option value="5">3 Extração de ligante [DNER 053/94]</option>
                            <option value="6">4 Abrasão Los Angeles [DNIT 451/2024]</option>
                            <option value="7">5 Adesividade (Tradicional) [DNER 078/94]</option>
                            <option value="8">6 Fluir ligante</option>
                        </optgroup>
                        <optgroup label="EQUIPAMENTOS INDIVIDUAIS">
                            <option value="2">Homogeneização e quarteamento</option>
                            <option value="3">Granulometria</option>
                            <option value="4">Densidade e absorção</option>
                            <option value="5">Indice de forma</option>
                            <option value="6">Abrasão Los Angeles</option>
                            <option value="7">Adesividade</option>
                            <option value="8">Sanidade</option>
                            <option value="13">Secagem de material</option>
                        </optgroup>
                    </select>
                </div>
            </div>

            <div class="action-area">
                <div class="password-box">
                    <input type="password" id="senha-lab" placeholder="Senha">
                    <button class="btn-primary" onclick="reservarSelecionados()" style="background-color: #1A4A5A; border-color: #143a46;">Confirmar Reservas Selecionadas</button>
                </div>
                <p class="cancel-notice">
                    Solicitação de <strong>CANCELAMENTO</strong> via e-mail: 
                    <a href="mailto:jorgelucas@det.ufc.br">jorgelucas@det.ufc.br</a>
                </p>
            </div>
        </section>
