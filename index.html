<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendamento | Lab Misturas Asfálticas</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #1A4A5A; --secondary: #D35400; --bg: #f8fafb; }
        #selecao-inicial { display: flex; justify-content: center; gap: 30px; padding: 50px 20px; flex-wrap: wrap; max-width: 1100px; margin: 0 auto; }
        .categoria-card { background: #fff; border: 3px solid #eee; border-radius: 20px; width: 300px; padding: 40px 20px; text-align: center; cursor: pointer; transition: 0.4s; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .categoria-card:hover { transform: translateY(-10px); border-color: var(--secondary); }
        .ensaio-card { background: #fff; border: 2px solid #eee; border-radius: 12px; cursor: pointer; transition: 0.3s; text-align: center; min-height: 190px; overflow: hidden; }
        .ensaio-card.selected { border-color: var(--primary); background: #f0f7f9; }
        .cards-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; margin-bottom: 25px; }
        #conteudo-principal, .detalhes-ensaio, .normas-info, .equipamentos-info { display: none; }
        .input-group input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; }
        /* Adicione o restante do CSS essencial aqui ou no style.css */
    </style>
</head>
<body>
    <header style="background: linear-gradient(135deg, #1A4A5A 0%, #2a6f84 100%); padding: 20px; color: white; text-align: center;">
        <h1>Sistema de Agendamento</h1>
        <p>LMP | INCT-Infra | UFC</p>
    </header>

    <section id="selecao-inicial">
        <div class="categoria-card" onclick="escolherCategoria('CARACTERIZAÇÃO DE MATERIAIS')"><h3>Caracterização</h3></div>
        <div class="categoria-card" onclick="escolherCategoria('ENSAIOS MECÂNICOS')"><h3>Ensaios Mecânicos</h3></div>
        <div class="categoria-card" onclick="escolherCategoria('USO DO LABORATÓRIO PARA AULAS')"><h3>Uso para Aulas</h3></div>
    </section>

    <div id="conteudo-principal">
        <main class="container" style="max-width: 1100px; margin: 0 auto; padding: 20px;">
            <button onclick="location.reload()">Voltar ao início</button>
            <div class="input-group">
                <input type="text" id="nome" placeholder="Nome Completo">
                <input type="text" id="categoria-display" readonly style="background:#eee">
            </div>
            
            <div id="container-cards-padrao" class="cards-container">
                </div>

            <div id="container-detalhes" class="detalhes-ensaio">
                <input type="number" id="qtd-amostras" value="1" onchange="atualizarDados()">
                <div id="caixa-equipamentos" class="equipamentos-info"></div>
            </div>

            <table id="tabela-horarios" style="width:100%; margin-top:20px;">
                <thead><tr><th>Horário</th><th>Status</th><th>Ação</th></tr></thead>
                <tbody id="corpo-agenda"></tbody>
            </table>
            <button onclick="confirmar()" style="background:var(--primary); color:white; padding:15px; margin-top:20px;">Confirmar Reserva</button>
        </main>
    </div>

    <script>
        const el = (id) => document.getElementById(id);
        let dados = { categoria: "", ensaio: "", subtipo: "" };

        function escolherCategoria(nome) {
            dados.categoria = nome;
            el('categoria-display').value = nome;
            el('selecao-inicial').style.display = 'none';
            el('conteudo-principal').style.display = 'block';
            gerarHorarios();
        }

        function gerarHorarios() {
            let html = '';
            for (let h = 7; h <= 15; h++) {
                let intervalo = `${h.toString().padStart(2, '0')}:00-${(h + 1).toString().padStart(2, '0')}:00`;
                html += `<tr><td>${intervalo}</td><td style="color:green">Disponível</td><td><input type="checkbox" value="${intervalo}"></td></tr>`;
            }
            el('corpo-agenda').innerHTML = html;
        }

        function selecionarEnsaio(nome, equip) {
            dados.ensaio = nome;
            el('container-detalhes').style.display = 'block';
            el('caixa-equipamentos').innerHTML = `<h4>Equipamentos:</h4><p>${equip}</p>`;
            el('caixa-equipamentos').style.display = 'block';
        }
    </script>
</body>
</html>
